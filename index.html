<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boşluk Temizleyici</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

textarea{
    width:100%;
    height:250px;
    padding:10px;
    font-size:16px;
    margin-bottom:15px;
}

button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
    margin-right:10px;
}

#sonuc{
    background:white;
}
</style>
</head>

<body>

<h1>Boşluk Temizleyici</h1>

<p>Metni yapıştır:</p>

<textarea id="giris"></textarea>

<button onclick="temizle()">Temizle</button>
<button onclick="kopyala()">Kopyala</button>

<p>Sonuç:</p>

<textarea id="sonuc" readonly></textarea>

<script>

function temizle() {

let metin = document.getElementById("giris").value;

metin = metin
.replace(/\s+/g, " ")
.trim();

document.getElementById("sonuc").value = metin;

}

function kopyala() {

const sonuc = document.getElementById("sonuc");

sonuc.select();

navigator.clipboard.writeText(sonuc.value);

alert("Kopyalandı!");

}

</script>

</body>
</html>

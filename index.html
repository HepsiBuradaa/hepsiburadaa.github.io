<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* 🌌 EPİK ARKA PLAN */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,180,0,0.08), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(0,140,255,0.06), transparent 40%);
    pointer-events:none;
}

/* 🧠 TAB BUTONLAR */
.tabs{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:20px;
}

.tab-btn{
    background:rgba(255,255,255,0.05);
    color:#fff;
    border:1px solid rgba(255,255,255,0.15);
    padding:10px 16px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    backdrop-filter: blur(10px);
}

.tab-btn:hover{
    transform:translateY(-2px);
    border-color:#ffb300;
    box-shadow:0 0 20px rgba(255,179,0,0.2);
}

.tab-btn.active{
    border-color:#ffb300;
    box-shadow:0 0 25px rgba(255,179,0,0.35);
}

/* 📦 KUTUCUKLAR (EPİK GLASS UI) */
.container{
    position:relative;
}

.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:scale(0.98);
    transition:.4s;
    pointer-events:none;
}

.tab-content.active{
    opacity:1;
    transform:scale(1);
    position:relative;
    pointer-events:auto;
}

/* ✨ TEXTAREA / OUTPUT */
textarea{
    width:100%;
    height:180px;
    background:rgba(255,255,255,0.04);
    color:white;
    border:1px solid rgba(255,255,255,0.12);
    padding:14px;
    border-radius:14px;
    outline:none;
    backdrop-filter: blur(12px);
    transition:.3s;
}

textarea:focus{
    border-color:#ffb300;
    box-shadow:0 0 25px rgba(255,179,0,0.15);
}

.output{
    width:100%;
    min-height:180px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.12);
    padding:14px;
    border-radius:14px;
    white-space:pre-wrap;
    backdrop-filter: blur(12px);
}

/* 🔘 BUTTON */
button{
    background:rgba(255,255,255,0.05);
    color:#fff;
    border:1px solid rgba(255,255,255,0.15);
    padding:10px 14px;
    margin-right:10px;
    border-radius:12px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    border-color:#ffb300;
    transform:translateY(-2px);
    box-shadow:0 0 15px rgba(255,179,0,0.25);
}

/* 🖱️ CUSTOM MOUSE FOLLOWER */
.cursor{
    width:18px;
    height:18px;
    border-radius:50%;
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
    background:radial-gradient(circle, #ffb300, #ff5500);
    box-shadow:0 0 20px rgba(255,179,0,0.6);
    transform:translate(-50%,-50%);
    transition:transform .08s linear;
}

.cursor-trail{
    width:40px;
    height:40px;
    border-radius:50%;
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
    border:1px solid rgba(255,179,0,0.4);
    transform:translate(-50%,-50%);
    transition:all .15s ease-out;
}
</style>
</head>

<body>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">

    <div class="tab-content active">
        <textarea id="input1"></textarea>
        <button onclick="cleanSpaces()">Temizle</button>
        <button onclick="copy1()">Kopyala</button>
        <button onclick="clear1()">Sil</button>
        <div id="output1" class="output"></div>
    </div>

    <div class="tab-content">
        <textarea id="input2"></textarea>
        <button onclick="fixText()">Düzelt</button>
        <button onclick="copy2()">Kopyala</button>
        <button onclick="clear2()">Sil</button>
        <div id="output2" class="output"></div>
    </div>

</div>

<!-- 🖱️ CURSOR -->
<div class="cursor"></div>
<div class="cursor-trail"></div>

<script>
/* TAB */
function openTab(i){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".tab-content")[i].classList.add("active");
document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* TEXT LOGIC */
const bannedWords=["yüksek kalite","hakiki deri","%100 deri","unisex"];

function escapeRegExp(s){
return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function highlight(t){
bannedWords.forEach(w=>{
t=t.replace(new RegExp(escapeRegExp(w),"gi"),m=>`<span style="color:#ff4d4d;font-weight:800">${m}</span>`);
});
return t;
}

function cleanSpaces(){
let t=document.getElementById("input1").value;
t=t.replace(/\u00A0/g," ")
.split("\n")
.map(l=>l.trim())
.filter(Boolean)
.join("\n");

document.getElementById("output1").innerHTML=highlight(t);
}

function copy1(){
navigator.clipboard.writeText(document.getElementById("output1").innerText);
}

function clear1(){
document.getElementById("input1").value="";
document.getElementById("output1").innerHTML="";
}

function fixText(){
let t=document.getElementById("input2").value;
t=t.replace(/\u00A0/g," ").toLowerCase();

let lines=t.split("\n").map(l=>{
l=l.trim();
if(!l)return"";
return highlight(l.charAt(0).toUpperCase()+l.slice(1));
}).filter(Boolean);

document.getElementById("output2").innerHTML=lines.join("<br>");
}

function copy2(){
navigator.clipboard.writeText(document.getElementById("output2").innerText);
}

function clear2(){
document.getElementById("input2").value="";
document.getElementById("output2").innerHTML="";
}

/* 🖱️ MOUSE FOLLOW EFFECT */
const cursor=document.querySelector(".cursor");
const trail=document.querySelector(".cursor-trail");

document.addEventListener("mousemove",(e)=>{
    cursor.style.top=e.clientY+"px";
    cursor.style.left=e.clientX+"px";

    setTimeout(()=>{
        trail.style.top=e.clientY+"px";
        trail.style.left=e.clientX+"px";
    },60);
});
</script>

</body>
</html>

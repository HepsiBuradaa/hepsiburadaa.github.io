<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel + Game</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#050b17;
    color:white;
    font-family:Arial;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
}

.tab-btn.active{
    border-color:#ffb300;
    transform:scale(1.05);
}

.container{position:relative;}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

textarea{
    width:100%;
    height:180px;
    background:#0d1628;
    color:white;
    border:1px solid #23324d;
    padding:12px;
}

.output{
    width:100%;
    min-height:180px;
    background:#0d1628;
    border:1px solid #23324d;
    padding:12px;
    margin-top:10px;
}

button{
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px 14px;
    margin:5px;
    cursor:pointer;
}

.bad-word{
    color:#ff2b2b;
    font-weight:bold;
}

/* GAME */
canvas{
    width:100%;
    height:420px;
    background:#111a33;
    border:2px solid #2b3a66;
}
</style>
</head>

<body>

<!-- TAB BUTTONS -->
<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım</button>
    <button class="tab-btn" onclick="openTab(2)">🎈 Oyun</button>
</div>

<!-- TAB 1 -->
<div class="tab-content active">
    <h3>Boşluk Temizleyici</h3>
    <textarea id="input1"></textarea>
    <button onclick="cleanSpaces()">Temizle</button>
    <button onclick="copy1()">Kopyala</button>
    <button onclick="clear1()">Sil</button>
    <div id="output1" class="output"></div>
</div>

<!-- TAB 2 -->
<div class="tab-content">
    <h3>Yazım Düzenleyici</h3>
    <textarea id="input2"></textarea>
    <button onclick="fixText()">Düzelt</button>
    <button onclick="copy2()">Kopyala</button>
    <button onclick="clear2()">Sil</button>
    <div id="output2" class="output"></div>
</div>

<!-- TAB 3 GAME -->
<div class="tab-content">
    <h3>🎈 Bubble Shooter</h3>

    <button onclick="startGame()">Başlat</button>
    <button onclick="resetGame()">Reset</button>
    <span>Skor: <b id="score">0</b></span>

    <canvas id="gameCanvas"></canvas>
</div>

<script>

/* TAB SYSTEM */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* TEXT TOOLS */
const bannedWords=["yüksek kalite","hakiki deri","unisex"];

function highlight(text){
    bannedWords.forEach(w=>{
        text=text.replace(new RegExp(w,"gi"),m=>`<span class="bad-word">${m}</span>`);
    });
    return text;
}

function cleanSpaces(){
    let t=input1.value;
    t=t.replace(/\s+/g," ").trim();
    output1.innerHTML=highlight(t);
}

function fixText(){
    let t=input2.value.toLowerCase();
    t=t.charAt(0).toUpperCase()+t.slice(1);
    output2.innerHTML=highlight(t);
}

function copy1(){navigator.clipboard.writeText(output1.innerText);}
function copy2(){navigator.clipboard.writeText(output2.innerText);}
function clear1(){input1.value="";output1.innerHTML="";}
function clear2(){input2.value="";output2.innerHTML="";}

/* GAME */
let canvas=document.getElementById("gameCanvas");
let ctx=canvas.getContext("2d");

let grid=[];
let bullet=null;
let score=0;
let running=false;

const colors=["red","blue","green","yellow","purple","orange"];
const r=18;

function resize(){
    canvas.width=canvas.offsetWidth;
    canvas.height=420;
}

function initGrid(){
    grid=[];
    for(let y=0;y<8;y++){
        let row=[];
        for(let x=0;x<10;x++){
            if(y<4){
                row.push({
                    x:x*2*r+(y%2)*r,
                    y:y*2*r,
                    color:colors[Math.floor(Math.random()*colors.length)]
                });
            }else row.push(null);
        }
        grid.push(row);
    }
}

function drawBall(x,y,c){
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=c;
    ctx.fill();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let y=0;y<grid.length;y++){
        for(let x=0;x<grid[y].length;x++){
            if(grid[y][x]) drawBall(grid[y][x].x,grid[y][x].y,grid[y][x].color);
        }
    }

    if(bullet) drawBall(bullet.x,bullet.y,bullet.color);
}

function update(){
    if(!running) return;

    if(bullet){
        bullet.x+=Math.cos(bullet.angle)*5;
        bullet.y+=Math.sin(bullet.angle)*5;

        for(let y=0;y<grid.length;y++){
            for(let x=0;x<grid[y].length;x++){
                let b=grid[y][x];
                if(b){
                    let dx=b.x-bullet.x;
                    let dy=b.y-bullet.y;
                    if(Math.sqrt(dx*dx+dy*dy)<r*2){
                        grid[y][x]={
                            x:b.x,
                            y:b.y,
                            color:bullet.color
                        };
                        check(x,y);
                        bullet=null;
                        return;
                    }
                }
            }
        }
    }

    draw();
    requestAnimationFrame(update);
}

function check(x,y){
    let color=grid[y][x].color;
    let visited={};

    function dfs(cx,cy){
        if(!grid[cy]||!grid[cy][cx]) return;
        let key=cx+","+cy;
        if(visited[key]) return;
        if(grid[cy][cx].color!==color) return;

        visited[key]=true;

        [[1,0],[-1,0],[0,1],[0,-1]].forEach(d=>{
            dfs(cx+d[0],cy+d[1]);
        });
    }

    dfs(x,y);

    if(Object.keys(visited).length>=3){
        for(let k in visited){
            let [cx,cy]=k.split(",");
            grid[cy][cx]=null;
        }
        score++;
        scoreEl.innerText=score;
    }
}

canvas.addEventListener("click",e=>{
    if(!bullet){
        let rct=canvas.getBoundingClientRect();

        bullet={
            x:canvas.width/2,
            y:400,
            angle:Math.atan2(e.clientY-rct.top-400,e.clientX-rct.left-canvas.width/2),
            color:colors[Math.floor(Math.random()*colors.length)]
        };
    }
});

function startGame(){
    resize();
    initGrid();
    running=true;
    update();
}

function resetGame(){
    initGrid();
    score=0;
    scoreEl.innerText=0;
    bullet=null;
}

let scoreEl=document.getElementById("score");

initGrid();

</script>

</body>
</html>

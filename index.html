<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    color:white;
    background:#05060a;
    overflow:hidden;
}

/* 🌌 ARKA PLAN */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,140,0,0.08), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(255,0,0,0.05), transparent 40%);
    pointer-events:none;
}

/* 🔥 ALEV EPİK KUTULAR */
.tab-content{
    position:relative;
    margin-top:10px;
    padding:10px;
}

/* Alev border efekti */
.tab-content.active::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:18px;
    background:linear-gradient(45deg,
        #ff3c00,
        #ffb300,
        #ff0000,
        #ff6a00,
        #ff3c00);
    background-size:300% 300%;
    z-index:-1;
    filter:blur(10px);
    animation:fireBorder 2.5s linear infinite;
}

/* iç panel */
textarea,.output{
    width:100%;
    height:180px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(10,10,10,0.6);
    color:white;
    padding:12px;
    backdrop-filter: blur(8px);
}

/* BUTTON */
button{
    margin:5px 5px 0 0;
    padding:10px 14px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,80,0,0.1);
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 15px rgba(255,80,0,0.4);
}

/* TAB */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
}

.tab-btn{
    padding:10px 14px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.05);
    color:white;
    cursor:pointer;
}

.tab-btn.active{
    border-color:#ffb300;
    box-shadow:0 0 20px rgba(255,140,0,0.4);
}

/* 🔥 ALEV ANİMASYON */
@keyframes fireBorder{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

/* 🐱 KEDİ CURSOR */
.cat{
    position:fixed;
    width:40px;
    height:40px;
    pointer-events:none;
    transform:translate(-50%,-50%);
    transition:0.08s linear;
    z-index:9999;
    filter:drop-shadow(0 0 10px orange);
}

/* kedi yüzü */
.cat::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at 30% 35%, orange 2px, transparent 3px),
        radial-gradient(circle at 70% 35%, orange 2px, transparent 3px),
        radial-gradient(circle at 50% 65%, rgba(255,140,0,0.9) 5px, transparent 6px);
    border-radius:50%;
    background-color:rgba(255,140,0,0.08);
    box-shadow:0 0 20px rgba(255,140,0,0.6);
}

/* 🐾 kuyruk izi */
.trail{
    position:fixed;
    width:60px;
    height:60px;
    border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle, rgba(255,120,0,0.2), transparent 60%);
    transform:translate(-50%,-50%);
    transition:0.15s ease-out;
}
</style>
</head>

<body>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Düzenleyici</button>
</div>

<div class="tab-content active">
    <textarea id="input1"></textarea>
    <button onclick="cleanSpaces()">Temizle</button>
    <button onclick="copy1()">Kopyala</button>
    <button onclick="clear1()">Sil</button>
    <div id="output1" class="output"></div>
</div>

<div class="tab-content">
    <textarea id="input2"></textarea>
    <button onclick="fixText()">Düzelt</button>
    <button onclick="copy2()">Kopyala</button>
    <button onclick="clear2()">Sil</button>
    <div id="output2" class="output"></div>
</div>

<!-- 🐱 CURSOR -->
<div class="cat"></div>
<div class="trail"></div>

<script>
function openTab(i){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".tab-content")[i].classList.add("active");
document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* basit text */
function cleanSpaces(){
let t=document.getElementById("input1").value;
t=t.replace(/\u00A0/g," ")
.split("\n")
.map(l=>l.trim())
.filter(Boolean)
.join("\n");
document.getElementById("output1").innerText=t;
}

function copy1(){
navigator.clipboard.writeText(document.getElementById("output1").innerText);
}

function clear1(){
document.getElementById("input1").value="";
document.getElementById("output1").innerText="";
}

function fixText(){
let t=document.getElementById("input2").value;
t=t.toLowerCase().split("\n").map(l=>{
l=l.trim();
if(!l)return"";
return l.charAt(0).toUpperCase()+l.slice(1);
}).filter(Boolean).join("\n");

document.getElementById("output2").innerText=t;
}

function copy2(){
navigator.clipboard.writeText(document.getElementById("output2").innerText);
}

function clear2(){
document.getElementById("input2").value="";
document.getElementById("output2").innerText="";
}

/* 🐱 KEDİ CURSOR MOVE */
const cat=document.querySelector(".cat");
const trail=document.querySelector(".trail");

document.addEventListener("mousemove",(e)=>{
cat.style.left=e.clientX+"px";
cat.style.top=e.clientY+"px";

setTimeout(()=>{
trail.style.left=e.clientX+"px";
trail.style.top=e.clientY+"px";
},40);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri Panel</title>

<style>
/* ==========================================================================
   EFSANE CANLI TEMA DEĞİŞKENLERİ (CANLI NEON VE PREMİUM TONLAR)
   ========================================================================== */
:root {
    --bg-main: #06060a;
    --bg-container: #0d0e15;
    --bg-input: #020204;
    --bg-btn: #12131a;
    --bg-btn-hover: #1a1c29;
    --bg-tab-active: #1a1c29;
    --text-main: #94a3b8;
    --text-input: #f8fafc;
    --text-heading: #ffffff;
    --text-btn: #94a3b8;
    --border-color: #222533;
    --border-container: #1e2235;
    --accent-color: #ff2a2a; /* Aşırı Canlı Siber Kırmızı */
    --accent-glow: rgba(255, 42, 42, 0.55);
}

/* PURE WHITE - ASİL VE NET AÇIK MOD */
html[data-theme="white"] {
    --bg-main: #f8fafc;
    --bg-container: #ffffff;
    --bg-input: #f1f5f9;
    --bg-btn: #e2e8f0;
    --bg-btn-hover: #cbd5e1;
    --bg-tab-active: #ffffff;
    --text-main: #334155;
    --text-input: #0f172a;
    --text-heading: #0f172a;
    --text-btn: #475569;
    --border-color: #cbd5e1;
    --border-container: #cbd5e1;
    --accent-color: #0066ff; /* Canlı Elektrik Mavisi */
    --accent-glow: rgba(0, 102, 255, 0.3);
}

/* CYBER PINK - KIZLARA ÖZEL NEON FUŞYA */
html[data-theme="pink"] {
    --bg-main: #18020c;
    --bg-container: #2c0417;
    --bg-input: #100108;
    --bg-btn: #440624;
    --bg-btn-hover: #5c0931;
    --bg-tab-active: #5c0931;
    --text-main: #f472b6;
    --text-input: #fff1f2;
    --text-heading: #ffffff;
    --text-btn: #f472b6;
    --border-color: #5c0931;
    --border-container: #440624;
    --accent-color: #ff007f; /* Patlayan Canlı Pembe */
    --accent-glow: rgba(255, 0, 127, 0.6);
}

/* DEEP BLUE - ERKEKLERE ÖZEL ELEKTRİK SAFİR */
html[data-theme="blue"] {
    --bg-main: #020617;
    --bg-container: #0f172a;
    --bg-input: #030712;
    --bg-btn: #1e293b;
    --bg-btn-hover: #334155;
    --bg-tab-active: #334155;
    --text-main: #38bdf8;
    --text-input: #f0f9ff;
    --text-heading: #ffffff;
    --text-btn: #38bdf8;
    --border-color: #334155;
    --border-container: #1e293b;
    --accent-color: #00d2ff; /* Ultra Parlak Siber Mavi */
    --accent-glow: rgba(0, 210, 255, 0.6);
}

/* NEON RED - AGRESİF CEHENNEM KIRMISIZI */
html[data-theme="red"] {
    --bg-main: #1a0000;
    --bg-container: #330000;
    --bg-input: #0f0000;
    --bg-btn: #4d0000;
    --bg-btn-hover: #660000;
    --bg-tab-active: #660000;
    --text-main: #f87171;
    --text-input: #fff5f5;
    --text-heading: #ffffff;
    --text-btn: #ff4d4d;
    --border-color: #660000;
    --border-container: #4d0000;
    --accent-color: #ff0000; /* Gerçek Saf Neon Kırmızı */
    --accent-glow: rgba(255, 0, 0, 0.7);
}

*{box-sizing:border-box;}

/* 🎯 İMLEÇLER ORİJİNAL VE KUSURSUZ STANDARDA DÖNDÜRÜLDÜ */
html, body, .input-area, div {
    cursor: default;
}
button, .tab-btn, .theme-dot, .input-area:hover, .output:hover {
    cursor: pointer;
}

body{
    margin:0;
    padding:20px;
    background: var(--bg-main) !important; 
    color: var(--text-main) !important;
    font-family:'Courier New', Courier, monospace; 
    overflow-x:hidden;
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
}

/* TEMA SEÇİCİ PANEL */
.theme-selector {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    max-width: 900px;
    margin: 0 auto 15px auto;
    align-items: center;
    background: var(--bg-container);
    padding: 10px 15px;
    border-radius: 6px;
    border: 1px solid var(--border-container);
}
.theme-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: bold;
    color: var(--text-btn);
}
.theme-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.2s ease;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.theme-dot:hover {
    transform: scale(1.25);
}
.theme-dot.active {
    border-color: var(--text-heading) !important;
    transform: scale(1.15);
    box-shadow: 0 0 15px var(--accent-color);
}

/* TABS CONTAINER */
.tabs{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
}

/* DİNAMİK BUTONLAR */
button, .tab-btn {
    background: var(--bg-btn);
    color: var(--text-btn);
    border: 1px solid var(--border-color);
    padding: 12px 24px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 4px;
    transition: all 0.2s ease;
}

button:hover, .tab-btn:hover {
    color: var(--text-heading) !important;
    background: var(--bg-btn-hover);
    border-color: var(--accent-color); 
    box-shadow: 0 0 15px var(--accent-glow);
}

/* AKTİF TAB */
.tab-btn.active {
    background: var(--bg-tab-active) !important;
    color: var(--accent-color) !important;
    border-color: var(--accent-color) !important;
    box-shadow: 0 0 20px var(--accent-glow);
}

/* İÇERİK ALANI */
.container{
    position:relative;
    width:100%;
    max-width: 900px;
    margin: 0 auto;
}

.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:scale(0.98);
    transition: all .25s ease-in-out;
    pointer-events:none;
    background: var(--bg-container);
    padding: 25px;
    border-radius: 6px;
    border: 1px solid var(--border-container);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.tab-content.active{
    opacity:1;
    transform:scale(1);
    position:relative;
    pointer-events:auto;
}

h3 {
    color: var(--text-heading);
    font-size: 15px;
    margin-top: 0;
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-left: 4px solid var(--accent-color);
    padding-left: 10px;
}

/* ZENGİN METİN GİRİŞ VE ÇIKIŞ ALANLARI */
.input-area, .output{
    width:100%;
    height:220px;
    background: var(--bg-input);
    color: var(--text-input);
    border: 1px solid var(--border-color);
    padding:14px;
    font-size: 14px; 
    line-height: 1.6;
    border-radius: 4px;
    outline: none;
    transition: all 0.2s;
    margin-bottom: 5px;
    overflow-y: auto;
    word-break: break-word;
}

.input-area:focus, .output:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 10px var(--accent-glow);
}

.output{
    min-height:220px;
    height: auto;
    border-style: dashed;
}

/* METİN BİLGİSİ */
.meta-info {
    font-size: 11px;
    color: var(--text-btn);
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
}
.meta-info span strong {
    color: #10b981; /* Canlı Yeşil */
}

.action-buttons {
    margin-bottom: 25px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

/* SİBER KIRMIZI YASAKLI KELİME */
.bad-word{
    color:#ff0033;
    font-weight:bold;
    background:rgba(255, 0, 51, 0.15);
    border: 1px solid rgba(255, 0, 51, 0.5);
    padding:1px 5px;
    border-radius:3px;
}

/* NEON BİLDİRİM TOAST */
.toast {
    position: fixed;
    top: -100px;
    right: 20px;
    background: var(--bg-container);
    border: 2px solid var(--accent-color);
    color: var(--text-heading);
    padding: 14px 28px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
    box-shadow: 0 0 25px var(--accent-glow);
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10000;
}
.toast.show {
    top: 20px;
}

/* WATERMARK */
.watermark{
    position:fixed;
    bottom:30px;
    left:0;
    width:100%;
    text-align:center;
    font-size:60px;
    font-weight:900;
    letter-spacing:20px;
    pointer-events:none;
    user-select:none;
    opacity: 0.03; 
    color: var(--text-heading);
    animation: pulse 4s ease-in-out infinite;
}

@keyframes pulse{
    0%,100%{transform:scale(1); opacity: 0.02;}
    50%{transform:scale(1.02); opacity: 0.05;}
}
</style>
</head>

<body>

<div class="theme-selector">
    <span class="theme-label">TEMA SEÇİMİ:</span>
    <div class="theme-dot active" style="background: #ff2a2a;" onclick="changeTheme('dark', this)" title="Cyber Dark"></div>
    <div class="theme-dot" style="background: #0066ff;" onclick="changeTheme('white', this)" title="Pure White"></div>
    <div class="theme-dot" style="background: #ff007f;" onclick="changeTheme('pink', this)" title="Cyber Pink (Kızlar)"></div>
    <div class="theme-dot" style="background: #00d2ff;" onclick="changeTheme('blue', this)" title="Deep Blue (Erkekler)"></div>
    <div class="theme-dot" style="background: #ff0000; box-shadow: inset 0 0 5px #000;" onclick="changeTheme('red', this)" title="Neon Red"></div>
</div>

<div id="toast-notification" class="toast">⚔️ METİN KOPYALANDI!</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(0)">🧹 Boşluk Temizleyici</button>
    <button class="tab-btn" onclick="openTab(1)">✍️ Yazım Düzenleyici</button>
</div>

<div class="container">

    <div class="tab-content active">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input1" class="input-area" contenteditable="true" oninput="calculateMeta(1)"></div>
        
        <div class="meta-info">
            <span id="char-count-1">Karakter: <strong>0</strong></span>
            <span id="word-count-1">Kelime: <strong>0</strong></span>
        </div>

        <div class="action-buttons">
            <button onclick="cleanSpaces()">Temizle</button>
            <button onclick="copy1()">Kopyala</button>
            <button onclick="clear1()">Sil</button>
        </div>
        <div id="output1" class="output" contenteditable="true"></div>
    </div>

    <div class="tab-content">
        <h3>Metni buraya yapıştır aslan parçası</h3>
        <div id="input2" class="input-area" contenteditable="true" oninput="calculateMeta(2)"></div>

        <div class="meta-info">
            <span id="char-count-2">Karakter: <strong>0</strong></span>
            <span id="word-count-2">Kelime: <strong>0</strong></span>
        </div>

        <div class="action-buttons">
            <button onclick="fixText()">Düzelt</button>
            <button onclick="copy2()">Kopyala</button>
            <button onclick="clear2()">Sil</button>
        </div>
        <div id="output2" class="output" contenteditable="true"></div>
    </div>

</div>

<div class="watermark">TENGRİ</div>

<script>

/* TEMA MOTORU */
function changeTheme(themeName, element) {
    if(themeName === 'dark') {
        document.documentElement.removeAttribute('data-theme');
    } else {
        document.documentElement.setAttribute('data-theme', themeName);
    }
    
    // Aktif daire işaretini güncelle
    document.querySelectorAll('.theme-dot').forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}

/* BİLDİRİM TOAST */
function showToast() {
    const toast = document.getElementById("toast-notification");
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 2000);
}

/* SAYAÇLAR */
function calculateMeta(tabIndex) {
    const text = document.getElementById(`input${tabIndex}`).innerText;
    const charCount = text.length;
    const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
    
    document.getElementById(`char-count-${tabIndex}`).innerHTML = `Karakter: <strong>${charCount}</strong>`;
    document.getElementById(`word-count-${tabIndex}`).innerHTML = `Kelime: <strong>${wordCount}</strong>`;
}

/* TAB GEÇİŞLERI */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* YASAKLI KELİMELER */
const bannedWords = [
    "yüksek kalite", "yüksek kaliteli", "hakiki deri", "gerçek deri", "%100 deri", "% 100 deri",
    "birinci sınıf", "1. kalite", "1. sınıf", "unisex", "1.sınıf", "1.kalite", "1.kalıte",
    "1. kalıte", "1.SINIF", "1. SINIF", "1.KALİTE", "1. KALİTE", "BİRİNCİ SINIF", "YÜKSEK KALİTE", "YÜKSEK KALITE"
];

function escapeRegExp(str){ return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function highlight(text){
    bannedWords.forEach(word=>{
        const pattern = escapeRegExp(word).replace(/\s+/g,"\\s+");
        const reg = new RegExp(pattern,"gi");
        text = text.replace(reg, m => `<span class="bad-word">${m}</span>`);
    });
    return text;
}

/* METİN TEMİZLEME MOTORU */
function cleanGarbageFromText(txt, forceLowercase = false) {
    if (!txt) return "";
    
    let clean = txt
        .replace(/&nbsp;/gi, " ")
        .replace(/nbsp;/gi, " ")
        .replace(/;nbsp/gi, " ")
        .replace(/&nbsp/gi, " ")
        .replace(/\u00A0/g, " ")
        .replace(/&amp;;/gi, " ")
        .replace(/&amp;/gi, " ")
        .replace(/&[^;]+;/g, " ")
        .replace(/&/g, " ")
        .replace(/;/g, " ");

    clean = clean.replace(/[ \t]+/g, " ");

    if (forceLowercase) {
        clean = clean.toLowerCase();
        clean = clean.replace(/(^|[.!?]\s+)([a-zçğıöşü])/g, (m, p1, p2) => p1 + p2.toUpperCase());
    }
    
    return clean;
}

/* ANA DÖNÜŞTÜRÜCÜ METOT (BOLD KORUYUCU) */
function cleanAndStructureDOM(htmlText, forceLowercase = false) {
    if (!htmlText.trim()) return "";

    let sandbox = document.createElement("div");
    sandbox.innerHTML = htmlText;
    
    function traverseAndClean(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            node.textContent = cleanGarbageFromText(node.textContent, forceLowercase);
        } else {
            for (let i = 0; i < node.childNodes.length; i++) {
                traverseAndClean(node.childNodes[i]);
            }
        }
    }
    
    traverseAndClean(sandbox);
    
    let structuralHTML = sandbox.innerHTML
        .replace(/<(div|p|br)[^>]*>/gi, "\n")
        .replace(/<\/(div|p)>/gi, "");
        
    let lines = structuralHTML.split("\n");
    let finalLines = [];
    
    lines.forEach(line => {
        let trimmedLine = line.trim();
        if (trimmedLine !== "" && trimmedLine !== "<br>" && trimmedLine !== "<b></b>" && trimmedLine !== "<strong></strong>") {
            trimmedLine = trimmedLine.replace(/>\s+</g, "><").replace(/[ \t]+/g, " ");
            finalLines.push(trimmedLine);
        }
    });
    
    return highlight(finalLines.join("<br>"));
}

/* KOPYALAYICI VE 14PX BOYUT ENJEKTÖRÜ */
function copyToClipboard(elementId) {
    const element = document.getElementById(elementId);
    const clone = element.cloneNode(true);
    
    // Yasaklı kelime kırmızı işaretlerini temizle
    clone.querySelectorAll('.bad-word').forEach(el => {
        const textNode = document.createTextNode(el.innerText);
        el.parentNode.replaceChild(textNode, el);
    });

    // Kopyalanan HTML metnini her zaman tam olarak 14px yapacak global sarmalayıcı ekle
    let finalFormattedHTML = `<span style="font-size: 14px; font-family: sans-serif; line-height: 1.6;">${clone.innerHTML}</span>`;

    const blob = new Blob([finalFormattedHTML], { type: 'text/html' });
    const textBlob = new Blob([clone.innerText], { type: 'text/plain' });
    const data = [new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob })];
    
    navigator.clipboard.write(data).then(() => { showToast(); });
}

/* TAB 1 - BOŞLUK TEMİZLEME */
function cleanSpaces(){
    let html = document.getElementById("input1").innerHTML;
    document.getElementById("output1").innerHTML = cleanAndStructureDOM(html, false);
}

// Enter tuşuna basıldığında div içinde düzgün alt satır oluşturma standardı
document.getElementById("input1").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        document.execCommand('insertLineBreak', false, null);
        e.preventDefault();
    }
});
document.getElementById("input2").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        document.execCommand('insertLineBreak', false, null);
        e.preventDefault();
    }
});

function copy1(){ copyToClipboard("output1"); }
function clear1(){
    document.getElementById("input1").innerHTML="";
    document.getElementById("output1").innerHTML="";
    calculateMeta(1);
}

/* TAB 2 - YAZIM DÜZENLEME */
function fixText(){
    let html = document.getElementById("input2").innerHTML;
    document.getElementById("output2").innerHTML = cleanAndStructureDOM(html, true);
}

function copy2(){ copyToClipboard("output2"); }
function clear2(){
    document.getElementById("input2").innerHTML="";
    document.getElementById("output2").innerHTML="";
    calculateMeta(2);
}

</script>

</body>
</html>

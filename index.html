<!DOCTYPE html>
<html lang="tr">
<head>

<title>Tengri Panel v3.5</title>

<style>
/* ==========================================================================
   PREMIUM SİBER RENK TEMALARI (KUSURSUZ VE CANLI)
   ========================================================================== */

/* 1. DEFAULT: CYBER PUNK (NEON RED) */
:root {
    --bg-main: #0a0505;
    --bg-container: #140b0b;
    --bg-input: #060202;
    --bg-btn: #1f0f0f;
    --bg-btn-hover: #2d1616;
    --bg-tab-active: #2d1616;
    --text-main: #e5c7c7;
    --text-input: #ffffff;
    --text-heading: #ffffff;
    --text-btn: #ff4444;
    --border-color: #3d1d1d;
    --border-container: #2d1616;
    --accent-color: #ff2222; 
    --accent-glow: rgba(255, 34, 34, 0.6);
}

/* 2. DEEP SAPPHIRE (SAFİR MAVİ) */
html[data-theme="blue"] {
    --bg-main: #050a15;
    --bg-container: #0b1326;
    --bg-input: #03060c;
    --bg-btn: #12203f;
    --bg-btn-hover: #1a2e5a;
    --bg-tab-active: #1a2e5a;
    --text-main: #c7d6e5;
    --text-input: #ffffff;
    --text-heading: #ffffff;
    --text-btn: #3399ff;
    --border-color: #1f3970;
    --border-container: #162952;
    --accent-color: #0077ff; 
    --accent-glow: rgba(0, 119, 255, 0.6);
}

/* 3. MATRIX NEON (HACKER YEŞİLİ) */
html[data-theme="green"] {
    --bg-main: #040805;
    --bg-container: #09140c;
    --bg-input: #020402;
    --bg-btn: #102415;
    --bg-btn-hover: #17331e;
    --bg-tab-active: #17331e;
    --text-main: #c7e5ce;
    --text-input: #ffffff;
    --text-heading: #ffffff;
    --text-btn: #39ff14;
    --border-color: #1b3d23;
    --border-container: #142e1b;
    --accent-color: #00ff44; 
    --accent-glow: rgba(0, 255, 68, 0.6);
}

/* 4. ACID PURPLE (NEON MOR) */
html[data-theme="purple"] {
    --bg-main: #09040c;
    --bg-container: #14091c;
    --bg-input: #040206;
    --bg-btn: #241033;
    --bg-btn-hover: #331749;
    --bg-tab-active: #331749;
    --text-main: #dec7e5;
    --text-input: #ffffff;
    --text-heading: #ffffff;
    --text-btn: #cc33ff;
    --border-color: #3d1b58;
    --border-container: #2e1442;
    --accent-color: #dd00ff; 
    --accent-glow: rgba(221, 0, 255, 0.6);
}

/* 5. AMBER GLOW (SİBER TURUNCU) */
html[data-theme="orange"] {
    --bg-main: #0b0603;
    --bg-container: #170d06;
    --bg-input: #040201;
    --bg-btn: #2b170b;
    --bg-btn-hover: #3a200f;
    --bg-tab-active: #3a200f;
    --text-main: #e5d2c7;
    --text-input: #ffffff;
    --text-heading: #ffffff;
    --text-btn: #ff9933;
    --border-color: #4f2b14;
    --border-container: #3d2110;
    --accent-color: #ff7700; 
    --accent-glow: rgba(255, 119, 0, 0.6);
}

/* 6. ICE NOVA (MODERN BUZ AÇIK MODU) */
html[data-theme="white"] {
    --bg-main: #eef2f7;
    --bg-container: #ffffff;
    --bg-input: #f8fafc;
    --bg-btn: #e2e8f0;
    --bg-btn-hover: #cbd5e1;
    --bg-tab-active: #ffffff;
    --text-main: #334155;
    --text-input: #0f172a;
    --text-heading: #0f172a;
    --text-btn: #475569;
    --border-color: #cbd5e1;
    --border-container: #e2e8f0;
    --accent-color: #0f172a; 
    --accent-glow: rgba(15, 23, 42, 0.15);
}

/* 7. MIDNIGHT PITCH (ZİFİRİ KARANLIK) */
html[data-theme="midnight"] {
    --bg-main: #000000;
    --bg-container: #0b0b0c;
    --bg-input: #030303;
    --bg-btn: #141416;
    --bg-btn-hover: #1c1c1f;
    --bg-tab-active: #1c1c1f;
    --text-main: #a1a1aa;
    --text-input: #f4f4f5;
    --text-heading: #ffffff;
    --text-btn: #e4e4e7;
    --border-color: #27272a;
    --border-container: #18181b;
    --accent-color: #ffffff; 
    --accent-glow: rgba(255, 255, 255, 0.3);
}

*{box-sizing:border-box;}

html, body, .input-area, div { cursor: default; }
button, .tab-btn, .theme-dot, .synergy-box { cursor: pointer; }

body {
    margin:0;
    padding:20px;
    background: var(--bg-main) !important; 
    color: var(--text-main) !important;
    font-family:'Courier New', Courier, monospace; 
    overflow-x:hidden;
    min-height: 100vh;
    transition: background 0.2s ease, color 0.2s ease;
}

/* TEMA SEÇİCİ ALAN */
.theme-selector {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    max-width: 900px;
    margin: 0 auto 10px auto;
    align-items: center;
    background: var(--bg-container);
    padding: 12px 18px;
    border-radius: 8px;
    border: 1px solid var(--border-container);
}
.theme-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: bold;
    color: var(--text-main);
}
.theme-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.2s ease;
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
}
.theme-dot:hover { transform: scale(1.25); }
.theme-dot.active {
    border-color: var(--text-heading) !important;
    transform: scale(1.15);
    box-shadow: 0 0 15px var(--accent-color);
}

/* 🎲 SİNERJİ SÖZÜ KUTUSU */
.synergy-box {
    max-width: 900px;
    margin: 0 auto 20px auto;
    background: var(--bg-container);
    border: 1px dashed var(--border-color);
    border-left: 4px solid var(--accent-color);
    padding: 14px 20px;
    border-radius: 6px;
    text-align: center;
    font-size: 13px;
    font-weight: bold;
    color: var(--text-heading);
    user-select: none;
    transition: all 0.2s ease;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
}
.synergy-box:hover {
    border-color: var(--accent-color);
    box-shadow: 0 0 15px var(--accent-glow);
    transform: translateY(-1px);
}
.synergy-box span {
    color: var(--accent-color);
    margin-right: 5px;
}

/* SEKME ALANI */
.tabs{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
}

/* BUTONLAR */
button, .tab-btn {
    background: var(--bg-btn);
    color: var(--text-btn);
    border: 1px solid var(--border-color);
    padding: 12px 24px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 4px;
    transition: all 0.2s ease;
}
button:hover, .tab-btn:hover {
    color: var(--text-heading) !important;
    background: var(--bg-btn-hover);
    border-color: var(--accent-color); 
    box-shadow: 0 0 15px var(--accent-glow);
}
.tab-btn.active {
    background: var(--bg-tab-active) !important;
    color: var(--accent-color) !important;
    border-color: var(--accent-color) !important;
    box-shadow: 0 0 20px var(--accent-glow);
}

/* ANA PANEL CONTAINER */
.container{
    position:relative;
    width:100%;
    max-width: 900px;
    margin: 0 auto;
}
.tab-content{
    position:absolute;
    width:100%;
    opacity:0;
    transform:scale(0.98);
    transition: all .2s ease-in-out;
    pointer-events:none;
    background: var(--bg-container);
    padding: 25px;
    border-radius: 8px;
    border: 1px solid var(--border-container);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}
.tab-content.active{
    opacity:1;
    transform:scale(1);
    position:relative;
    pointer-events:auto;
}

h3 {
    color: var(--text-heading);
    font-size: 15px;
    margin-top: 0;
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-left: 4px solid var(--accent-color);
    padding-left: 10px;
}

/* TEXTAREA ALANLARI */
.input-area, .output{
    width:100%;
    height:220px;
    background: var(--bg-input);
    color: var(--text-input);
    border: 1px solid var(--border-color);
    padding:14px;
    font-size: 14px; 
    line-height: 1.6;
    border-radius: 4px;
    outline: none;
    transition: all 0.2s;
    margin-bottom: 5px;
    overflow-y: auto;
    word-break: break-word;
}
.input-area:focus, .output:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 12px var(--accent-glow);
}
.output{
    min-height:220px;
    height: auto;
    border-style: dashed;
}

/* SAYAÇ BİLGİLERİ */
.meta-info {
    font-size: 11px;
    color: var(--text-main);
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
    opacity: 0.8;
}
.meta-info span strong { color: var(--accent-color); }

.action-buttons {
    margin-bottom: 25px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

/* YASAKLI KELİME STİLİ */
.bad-word{
    color:#ff1144;
    font-weight:bold;
    background:rgba(255, 17, 68, 0.12);
    border: 1px solid rgba(255, 17, 68, 0.4);
    padding:1px 5px;
    border-radius:3px;
}

/* TOAST BİLDİRİM */
.toast {
    position: fixed;
    top: -100px;
    right: 20px;
    background: var(--bg-container);
    border: 2px solid var(--accent-color);
    color: var(--text-heading);
    padding: 14px 28px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
    box-shadow: 0 0 25px var(--accent-glow);
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10000;
}
.toast.show { top: 20px; }

/* WATERMARK */
.watermark{
    position:fixed;
    bottom:30px;
    left:0;
    width:100%;
    text-align:center;
    font-size:60px;
    font-weight:900;
    letter-spacing:20px;
    pointer-events:none;
    user-select:none;
    opacity: 0.02; 
    color: var(--text-heading);
    animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse{
    0%,100%{transform:scale(1); opacity: 0.01;}
    50%{transform:scale(1.02); opacity: 0.03;}
}
</style>
</head>

<body>

        <div id="input2" class="input-area" contenteditable="true" oninput="calculateMeta(2)"></div>

        <div class="meta-info">
            <span id="char-count-2">Karakter: <strong>0</strong></span>
            <span id="word-count-2">Kelime: <strong>0</strong></span>
        </div>

        <div class="action-buttons">
            <button onclick="fixText()">Düzelt</button>
            <button onclick="copy2()">Kopyala</button>

<div class="watermark">TENGRİ</div>

<script>

/* 🎯 30 ADET EĞLENCELİ VE KOMİK SİNERJİ SÖZÜ LİSTESİ */
const synergyQuotes = [
    "Bugün yapacağın kopyala-yapıştırlar, yarınki ciroların temelidir aslan parçası.",

    "Giriş alanına bakıp derin nefes al... O gereksiz boşlukları tırnaklayacağız!",
    "Müşteri açıklamayı okumadan alacak olsa da biz buraya sanatımızı bırakıyoruz.",

    "Ctrl+C senin kılıcın, Ctrl+V ise senin kalkanındır. Savaş başlasın!",
    "Metni yapıştır, butona bas ve arkana yaslan. Gerisini Tengri halleder.",
    "Biz burada sadece boşluk temizlemiyoruz, dijital kaosun önüne geçiyoruz.",
    "Günün tavsiyesi: Yasaklı kelimeleri silerken patronun arkandan geçmediğinden emin ol.",
    "Bu panel sadece siber renklerden ibaret değil, burası bir üretkenlik mabedi.",
    "Yazım hataları müşteriyi kaçırır, Tengri Panel ise onları sepete hapseder.",
    "Bugün yapacağın temizlik, yarın yapacağın ciroya göz kırpıyor.",
    "İçerideki 'unisex' kelimesini yok ettiğinde dünyadaki bir editör huzura eriyor.",
    "Zor bir gün mü? Unutma, o kopyalanan HTML kodları kendi kendini temizleyemez.",
    "Space tuşuna çok sert basma, onun da bir kalbi ve basım ömrü var.",
    "Algoritmanın canı sıkkın olabilir ama senin metnin jilet gibi olmak zorunda.",
    "Trendyol paneline girmeden önce Tengri'den geçmeyen metin, metin değildir.",
    "Şu an tam olarak kaç karakter temizlediğini sayaçlar biliyor, skorunu yüksek tut!",
    "Bir e-ticaret dehası metni temizlemeden asla kopyalamaz. Sen bir dehasın.",
    "Metin bittiğinde kopyala butonuna basmanın verdiği o tatmin hissi paha biçilemez.",
    "Klavye seslerin ofiste yankılansın, bırak herkes ne kadar sıkı çalıştığını duysun!"
];

/* RANDOM SÖZ ÜRETİCİ MOTOR */
let lastIndex = -1;
function generateSynergyWord() {
    let randomIndex;
    // Üst üste aynı sözün gelmesini engelleme mantığı
    do {
        randomIndex = Math.floor(Math.random() * synergyQuotes.length);
    } while (randomIndex === lastIndex);
    
    lastIndex = randomIndex;
    document.getElementById("synergy-text").innerText = synergyQuotes[randomIndex];
}

/* TEMA MOTORU */
function changeTheme(themeName, element) {
    if(themeName === 'dark') {
        document.documentElement.removeAttribute('data-theme');
    } else {
        document.documentElement.setAttribute('data-theme', themeName);
    }
    document.querySelectorAll('.theme-dot').forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}

/* BİLDİRİM TOAST */
function showToast() {
    const toast = document.getElementById("toast-notification");
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 2000);
}

/* SAYAÇLAR */
function calculateMeta(tabIndex) {
    const text = document.getElementById(`input${tabIndex}`).innerText;
    const charCount = text.length;
    const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
    
    document.getElementById(`char-count-${tabIndex}`).innerHTML = `Karakter: <strong>${charCount}</strong>`;
    document.getElementById(`word-count-${tabIndex}`).innerHTML = `Kelime: <strong>${wordCount}</strong>`;
}

/* TAB GEÇİŞLERI */
function openTab(i){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab-content")[i].classList.add("active");
    document.querySelectorAll(".tab-btn")[i].classList.add("active");
}

/* YASAKLI KELİMELER */
const bannedWords = [
    "yüksek kalite", "yüksek kaliteli", "hakiki deri", "gerçek deri", "%100 deri", "% 100 deri",
    "birinci sınıf", "1. kalite", "1. sınıf", "unisex", "1.sınıf", "1.kalite", "1.kalıte",
    "1. kalıte", "1.SINIF", "1. SINIF", "1.KALİTE", "1. KALİTE", "BİRİNCİ SINIF", "YÜKSEK KALİTE", "YÜKSEK KALITE"
];

function escapeRegExp(str){ return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function highlight(text) {
    bannedWords.forEach(word => {
        const pattern = escapeRegExp(word).replace(/\s+/g,"\\s+");
        const reg = new RegExp(pattern,"gi");
        text = text.replace(reg, m => `<span class="bad-word">${m}</span>`);
    });
    return text;
}

function cleanGarbageFromText(txt, forceLowercase = false) {
    if (!txt) return "";
    let clean = txt
        .replace(/&nbsp;/gi, " ")
        .replace(/nbsp;/gi, " ")
        .replace(/;nbsp/gi, " ")
        .replace(/&nbsp/gi, " ")
        .replace(/\u00A0/g, " ")
        .replace(/&amp;;/gi, " ")
        .replace(/&amp;/gi, " ")
        .replace(/&[^;]+;/g, " ")
        .replace(/&/g, " ")
        .replace(/;/g, " ");

    clean = clean.replace(/[ \t]+/g, " ");

    if (forceLowercase) {
        clean = clean.toLowerCase();
        clean = clean.replace(/(^|[.!?]\s+)([a-zçğıöşü])/g, (m, p1, p2) => p1 + p2.toUpperCase());
    }
    return clean;
}

function cleanAndStructureDOM(htmlText, forceLowercase = false) {
    if (!htmlText.trim()) return "";
    let sandbox = document.createElement("div");
    sandbox.innerHTML = htmlText;
    
    function traverseAndClean(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            node.textContent = cleanGarbageFromText(node.textContent, forceLowercase);
        } else {
            for (let i = 0; i < node.childNodes.length; i++) {
                traverseAndClean(node.childNodes[i]);
            }
        }
    }
    traverseAndClean(sandbox);
    
    let structuralHTML = sandbox.innerHTML
        .replace(/<(div|p|br)[^>]*>/gi, "\n")
        .replace(/<\/(div|p)>/gi, "");
        
    let lines = structuralHTML.split("\n");
    let finalLines = [];
    
    lines.forEach(line => {
        let trimmedLine = line.trim();
        if (trimmedLine !== "" && trimmedLine !== "<br>" && trimmedLine !== "<b></b>" && trimmedLine !== "<strong></strong>") {
            trimmedLine = trimmedLine.replace(/>\s+</g, "><").replace(/[ \t]+/g, " ");
            finalLines.push(trimmedLine);
        }
    });
    return highlight(finalLines.join("<br>"));
}

function copyToClipboard(elementId) {
    const element = document.getElementById(elementId);
    const clone = element.cloneNode(true);
    clone.querySelectorAll('.bad-word').forEach(el => {
        const textNode = document.createTextNode(el.innerText);
        el.parentNode.replaceChild(textNode, el);
    });
    let finalFormattedHTML = `<span style="font-size: 14px; font-family: sans-serif; line-height: 1.6;">${clone.innerHTML}</span>`;
    const blob = new Blob([finalFormattedHTML], { type: 'text/html' });
    const textBlob = new Blob([clone.innerText], { type: 'text/plain' });
    const data = [new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob })];
    navigator.clipboard.write(data).then(() => { showToast(); });
}
